<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  html,body{margin:0;padding:0;background:transparent;}
  @keyframes syn-spark-core{
    0%,3%{opacity:0;transform:translate(-50%,-50%) scale(0);}
    7%{opacity:1;transform:translate(-50%,-50%) scale(1.6);filter:blur(0.5px) brightness(2.2);}
    11%{opacity:1;transform:translate(-50%,-50%) scale(0.9);}
    14%,80%{opacity:0.95;transform:translate(-50%,-50%) scale(1);}
    86%{opacity:1;transform:translate(-50%,-50%) scale(1.25);}
    92%{opacity:0.9;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(0.7);}
  }
  @keyframes syn-ray{
    0%,4%{opacity:0;transform:translate(-50%,-50%) rotate(var(--rot)) scaleY(0);}
    8%{opacity:1;transform:translate(-50%,-50%) rotate(var(--rot)) scaleY(1.5);}
    16%{opacity:0.55;transform:translate(-50%,-50%) rotate(var(--rot)) scaleY(1);}
    50%{opacity:0.12;transform:translate(-50%,-50%) rotate(calc(var(--rot) + 8deg)) scaleY(0.9);}
    80%{opacity:0.22;transform:translate(-50%,-50%) rotate(var(--rot)) scaleY(1);}
    90%{opacity:0.9;transform:translate(-50%,-50%) rotate(var(--rot)) scaleY(1.3);}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--rot)) scaleY(0.4);}
  }
  @keyframes syn-glow{
    0%,4%{opacity:0;transform:translate(-50%,-50%) scale(0.2);}
    9%{opacity:0.9;transform:translate(-50%,-50%) scale(1.4);}
    16%{opacity:0.45;transform:translate(-50%,-50%) scale(1);}
    50%{opacity:0.3;transform:translate(-50%,-50%) scale(0.92);}
    84%{opacity:0.5;transform:translate(-50%,-50%) scale(1.05);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(0.8);}
  }
  @keyframes syn-icon{
    0%,5%{opacity:0;transform:scale(0.16);filter:brightness(3) blur(5px);}
    9%{opacity:0.5;transform:scale(0.16);filter:brightness(3) blur(4px);}
    24%{opacity:1;transform:scale(1);filter:brightness(1) blur(0);}
    26%,82%{opacity:1;transform:scale(1);filter:brightness(1) blur(0);}
    88%{opacity:1;transform:scale(1.02);filter:brightness(1.15) blur(0);}
    100%{opacity:0;transform:scale(1.06);filter:brightness(1.4) blur(2px);}
  }
  @keyframes syn-word{
    0%,22%{opacity:0;clip-path:inset(0 71% 0 29%);}
    26%{opacity:1;clip-path:inset(0 71% 0 29%);}
    48%{opacity:1;clip-path:inset(0 0% 0 29%);}
    82%{opacity:1;clip-path:inset(0 0% 0 29%);}
    100%{opacity:0;clip-path:inset(0 0% 0 29%);}
  }
  @keyframes syn-shimmer{
    0%,50%{background-position:-140% 0;}
    64%{background-position:240% 0;}
    100%{background-position:240% 0;}
  }
  @keyframes syn-breathe{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.012);}
  }
  @keyframes syn-halo{
    0%,4%{opacity:0;}
    24%{opacity:0.6;}
    50%{opacity:0.32;}
    84%{opacity:0.55;}
    100%{opacity:0;}
  }
</style>
</helmet>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#0a0e17"/><g fill="none" stroke="#9db4e6" stroke-width="3"><circle cx="50" cy="50" r="22"/></g><path d="M50 34 L53 47 L66 50 L53 53 L50 66 L47 53 L34 50 L47 47 Z" fill="#e6eeff"/></svg>
</template>
<div style="position:relative;width:100%;height:100vh;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;">

  <div style="position:relative;width:92%;max-width:860px;aspect-ratio:640 / 219;animation:syn-breathe 6.5s ease-in-out infinite;">

    <div style="position:absolute;left:13.6%;top:48%;width:46%;height:120%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(closest-side, rgba(150,180,235,0.22), rgba(120,150,210,0.06) 55%, transparent 72%);filter:blur(6px);animation:syn-halo 5.2s ease-in-out infinite;pointer-events:none;"></div>

    <img src="synora-wordmark.webp" alt="Synora icon" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;clip-path:inset(0 71% 0 0);transform-origin:13.6% 48%;animation:syn-icon 5.2s ease-in-out infinite;" />

    <img src="synora-wordmark.webp" alt="Synora wordmark" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;animation:syn-word 5.2s ease-in-out infinite;" />

    <div style="position:absolute;inset:0;-webkit-mask:url(synora-wordmark.webp) center/contain no-repeat;mask:url(synora-wordmark.webp) center/contain no-repeat;background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.85) 50%, transparent 60%);background-size:220% 100%;mix-blend-mode:screen;animation:syn-shimmer 5.2s ease-in-out infinite;pointer-events:none;"></div>

    <div style="position:absolute;left:13.6%;top:48%;width:34%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(closest-side, rgba(210,225,255,0.55), rgba(150,180,235,0.14) 45%, transparent 68%);animation:syn-glow 5.2s ease-in-out infinite;pointer-events:none;filter:blur(1px);"></div>
    <div style="position:absolute;left:13.6%;top:48%;width:2.2%;aspect-ratio:1 / 15;--rot:0deg;transform:translate(-50%,-50%) rotate(0deg);background:linear-gradient(to bottom, transparent, rgba(235,242,255,0.95) 50%, transparent);animation:syn-ray 5.2s ease-in-out infinite;pointer-events:none;"></div>
    <div style="position:absolute;left:13.6%;top:48%;width:20%;aspect-ratio:15 / 1;--rot:0deg;transform:translate(-50%,-50%) rotate(0deg);background:linear-gradient(to right, transparent, rgba(235,242,255,0.9) 50%, transparent);animation:syn-ray 5.2s ease-in-out infinite;pointer-events:none;"></div>
    <div style="position:absolute;left:13.6%;top:48%;width:14%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(closest-side, rgba(255,255,255,0.95), rgba(190,210,255,0.3) 40%, transparent 70%);animation:syn-spark-core 5.2s ease-in-out infinite;pointer-events:none;"></div>

  </div>
</div>
</x-dc>
</body>
</html>
